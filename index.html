<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111319">
<title>テトリス</title>
<style>
  :root {
    --bg: #111319;
    --panel: #1c2030;
    --border: #3a3f55;
    --text: #e8e8f0;
    --accent: #6ee7ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    overscroll-behavior: none;
  }
  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Hiragino Sans", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    touch-action: manipulation;
  }
  .app {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0 0 12px;
  }
  h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 2px;
  }
  #pause-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px;
    height: 34px;
    border-radius: 8px;
    font-size: 16px;
    padding: 0;
    line-height: 1;
    cursor: pointer;
  }
  canvas {
    background: #0a0b10;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: block;
    touch-action: none;
  }
  .board-wrap {
    position: relative;
    width: min(300px, 88vw);
  }
  #board {
    width: 100%;
    height: auto;
  }
  .side {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .panel .label {
    font-size: 12px;
    color: #9aa0b8;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .panel .value {
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
  }
  #next-canvas {
    background: #0a0b10;
    border-radius: 6px;
    display: block;
    margin: 0 auto;
  }
  .keys {
    font-size: 12px;
    line-height: 1.7;
    color: #9aa0b8;
  }
  .keys b { color: var(--text); }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 11, 16, 0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    text-align: center;
    gap: 14px;
  }
  .overlay.show { display: flex; }
  .overlay h2 {
    margin: 0;
    font-size: 26px;
  }
  button {
    font-family: inherit;
  }
  #overlay-btn {
    background: var(--accent);
    color: #0a0b10;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  #overlay-btn:hover { filter: brightness(1.1); }

  /* Touch controls: shown only on touch/coarse-pointer devices */
  .touch-controls { display: none; }
  @media (pointer: coarse) {
    .touch-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
      user-select: none;
    }
    .keys { display: none; }
  }
  .tc-row {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .tc-btn {
    -webkit-touch-callout: none;
    touch-action: none;
    user-select: none;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    font-size: 22px;
    width: 64px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .tc-btn:active {
    background: var(--border);
  }
  .tc-btn.tc-wide { width: 100px; }

  @media (max-width: 640px) {
    body {
      height: 100dvh;
      align-items: stretch;
      justify-content: stretch;
      padding: 8px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      overflow: hidden;
    }
    .app {
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      height: 100%;
      gap: 6px;
    }
    .title-row { flex: 0 0 auto; margin-bottom: 0; }
    .board-wrap {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      max-width: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #board {
      flex: 1 1 0;
      min-height: 0;
      min-width: 0;
      width: auto;
      max-width: 100%;
      aspect-ratio: 1 / 2;
    }
    .touch-controls {
      flex: 0 0 auto;
      margin-top: 6px;
    }
    .tc-btn {
      width: 52px;
      height: 44px;
      font-size: 18px;
    }
    .side {
      flex: 0 0 auto;
      width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
    }
    .side .panel { flex: 1 1 70px; padding: 5px 10px; }
    .side .panel:has(#next-canvas) { flex: 0 0 auto; padding: 4px 8px; }
    #next-canvas { width: 40px; height: 40px; }
    .panel .label { font-size: 9px; margin-bottom: 1px; }
    .panel .value { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="board-wrap">
    <div class="title-row">
      <h1>TETRIS</h1>
      <button id="pause-btn" aria-label="一時停止">⏸</button>
    </div>
    <canvas id="board" width="300" height="600"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">PAUSED</h2>
      <button id="overlay-btn">再開</button>
    </div>
    <div class="touch-controls" id="touch-controls">
      <div class="tc-row">
        <button class="tc-btn" id="tc-rotate" aria-label="回転">⟳</button>
        <button class="tc-btn" id="tc-drop" aria-label="ハードドロップ">⤓</button>
      </div>
      <div class="tc-row">
        <button class="tc-btn" id="tc-left" aria-label="左に移動">◀</button>
        <button class="tc-btn" id="tc-down" aria-label="ソフトドロップ">▼</button>
        <button class="tc-btn" id="tc-right" aria-label="右に移動">▶</button>
      </div>
    </div>
  </div>
  <div class="side">
    <div class="panel">
      <div class="label">NEXT</div>
      <canvas id="next-canvas" width="100" height="100"></canvas>
    </div>
    <div class="panel">
      <div class="label">SCORE</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <div class="label">LEVEL</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel">
      <div class="label">LINES</div>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel keys">
      <b>操作方法</b><br>
      ← →: 移動<br>
      ↑: 回転<br>
      ↓: ソフトドロップ<br>
      Space: ハードドロップ<br>
      P: 一時停止<br>
      R: リスタート
    </div>
  </div>
</div>

<script>
const COLS = 10;
const ROWS = 20;
const CELL = 30;

const COLORS = {
  I: '#6ee7ff',
  O: '#ffd166',
  T: '#c77dff',
  S: '#7bf1a8',
  Z: '#ff6b6b',
  J: '#5c9dff',
  L: '#ff9f4a'
};

const SHAPES = {
  I: [[0,1],[1,1],[2,1],[3,1]],
  O: [[1,0],[2,0],[1,1],[2,1]],
  T: [[1,0],[0,1],[1,1],[2,1]],
  S: [[1,0],[2,0],[0,1],[1,1]],
  Z: [[0,0],[1,0],[1,1],[2,1]],
  J: [[0,0],[0,1],[1,1],[2,1]],
  L: [[2,0],[0,1],[1,1],[2,1]]
};

const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');
const scoreEl = document.getElementById('score');
const levelEl = document.getElementById('level');
const linesEl = document.getElementById('lines');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayBtn = document.getElementById('overlay-btn');
const pauseBtn = document.getElementById('pause-btn');

let grid, current, next, score, level, lines, gameOver, paused;
let dropInterval, lastTime, dropCounter;

function emptyGrid() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPieceType() {
  const types = Object.keys(SHAPES);
  return types[Math.floor(Math.random() * types.length)];
}

function makePiece(type) {
  const cells = SHAPES[type].map(([x, y]) => ({ x, y }));
  return { type, cells, x: 3, y: -1 };
}

function rotateCells(cells) {
  // rotate around the piece's bounding box center using simple matrix rotation
  const cx = 1.5, cy = 1.5;
  return cells.map(({ x, y }) => {
    const rx = cx - (y - cy);
    const ry = cy + (x - cx);
    return { x: Math.round(rx), y: Math.round(ry) };
  });
}

function collides(cells, offX, offY) {
  for (const c of cells) {
    const x = c.x + offX;
    const y = c.y + offY;
    if (x < 0 || x >= COLS || y >= ROWS) return true;
    if (y >= 0 && grid[y][x]) return true;
  }
  return false;
}

function spawnPiece() {
  current = next;
  current.x = 3;
  current.y = -1;
  next = makePiece(randomPieceType());
  if (collides(current.cells, current.x, current.y)) {
    endGame();
  }
  drawNext();
}

function lockPiece() {
  for (const c of current.cells) {
    const x = c.x + current.x;
    const y = c.y + current.y;
    if (y >= 0) grid[y][x] = current.type;
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (grid[y].every(cell => cell)) {
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      y++;
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800][cleared] * level;
    score += points;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 1000 - (level - 1) * 80);
    updateHud();
  }
}

function move(dx) {
  if (!collides(current.cells, current.x + dx, current.y)) {
    current.x += dx;
  }
}

function softDrop() {
  if (!collides(current.cells, current.x, current.y + 1)) {
    current.y += 1;
    return true;
  } else {
    lockPiece();
    return false;
  }
}

function hardDrop() {
  while (!collides(current.cells, current.x, current.y + 1)) {
    current.y += 1;
  }
  lockPiece();
  dropCounter = 0;
}

function rotate() {
  if (current.type === 'O') return;
  const rotated = rotateCells(current.cells);
  const kicks = [0, -1, 1, -2, 2];
  for (const k of kicks) {
    if (!collides(rotated, current.x + k, current.y)) {
      current.cells = rotated;
      current.x += k;
      return;
    }
  }
}

function updateHud() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  linesEl.textContent = lines;
}

function drawCell(c, x, y, color) {
  c.fillStyle = color;
  c.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
  c.strokeStyle = 'rgba(255,255,255,0.15)';
  c.strokeRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
}

function draw() {
  ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x]) drawCell(ctx, x, y, COLORS[grid[y][x]]);
    }
  }
  for (const c of current.cells) {
    const y = c.y + current.y;
    if (y >= 0) drawCell(ctx, c.x + current.x, y, COLORS[current.type]);
  }
}

function drawNext() {
  nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const size = 20;
  const xs = next.cells.map(c => c.x);
  const ys = next.cells.map(c => c.y);
  const minX = Math.min(...xs), minY = Math.min(...ys);
  for (const c of next.cells) {
    nctx.fillStyle = COLORS[next.type];
    nctx.fillRect((c.x - minX) * size + 10, (c.y - minY) * size + 10, size - 2, size - 2);
  }
}

function endGame() {
  gameOver = true;
  overlayTitle.textContent = 'GAME OVER';
  overlayBtn.textContent = 'リスタート';
  overlay.classList.add('show');
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  if (paused) {
    overlayTitle.textContent = 'PAUSED';
    overlayBtn.textContent = '再開';
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
    lastTime = performance.now();
  }
}

function resetGame() {
  grid = emptyGrid();
  score = 0;
  level = 1;
  lines = 0;
  dropInterval = 1000;
  dropCounter = 0;
  gameOver = false;
  paused = false;
  overlay.classList.remove('show');
  next = makePiece(randomPieceType());
  spawnPiece();
  updateHud();
  lastTime = performance.now();
}

function loop(time) {
  if (!gameOver && !paused) {
    const delta = time - lastTime;
    dropCounter += delta;
    if (dropCounter > dropInterval) {
      softDrop();
      dropCounter = 0;
    }
    draw();
  }
  lastTime = time;
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') { resetGame(); return; }
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  if (gameOver || paused) return;
  switch (e.key) {
    case 'ArrowLeft': move(-1); break;
    case 'ArrowRight': move(1); break;
    case 'ArrowDown': softDrop(); dropCounter = 0; break;
    case 'ArrowUp': rotate(); break;
    case ' ': e.preventDefault(); hardDrop(); break;
  }
});

overlayBtn.addEventListener('click', () => {
  if (gameOver) {
    resetGame();
  } else {
    togglePause();
  }
});

pauseBtn.addEventListener('click', togglePause);

// Touch controls: tap for single actions, press-and-hold repeats for movement.
function bindTap(el, action) {
  el.addEventListener('click', (e) => {
    e.preventDefault();
    if (gameOver || paused) return;
    action();
  });
}

function bindHold(el, action, repeatMs = 100, initialDelayMs = 220) {
  let holdTimer = null;
  let active = false;

  const fire = () => {
    if (gameOver || paused) return;
    action();
  };

  const start = (e) => {
    e.preventDefault();
    if (active) return;
    active = true;
    fire();
    holdTimer = setTimeout(function repeat() {
      if (!active) return;
      fire();
      holdTimer = setTimeout(repeat, repeatMs);
    }, initialDelayMs);
  };

  const stop = (e) => {
    if (e) e.preventDefault();
    active = false;
    clearTimeout(holdTimer);
  };

  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', stop);
  el.addEventListener('touchcancel', stop);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
}

bindTap(document.getElementById('tc-rotate'), rotate);
bindTap(document.getElementById('tc-drop'), hardDrop);
bindHold(document.getElementById('tc-left'), () => move(-1));
bindHold(document.getElementById('tc-right'), () => move(1));
bindHold(document.getElementById('tc-down'), () => { softDrop(); dropCounter = 0; });

resetGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
